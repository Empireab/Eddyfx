<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Oval background with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Oval shape -->
  <ellipse cx="60" cy="40" rx="55" ry="35" fill="url(#logoGradient)" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>

  <!-- Microphone icon -->
  <g transform="translate(45,20)">
    <!-- Mic body -->
    <rect x="5" y="15" width="10" height="25" rx="5" fill="#00d4ff"/>
    <!-- Mic head -->
    <circle cx="10" cy="10" r="8" fill="#00d4ff"/>
    <!-- Mic stand -->
    <rect x="8" y="40" width="4" height="15" fill="#00d4ff"/>
    <rect x="2" y="50" width="16" height="4" fill="#00d4ff"/>
  </g>

  <!-- Sound waves -->
  <path d="M85 25 Q90 20 90 25 Q90 30 85 25" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M85 35 Q92 28 92 35 Q92 42 85 35" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M85 45 Q95 35 95 45 Q95 55 85 45" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
